        var grupo = feature_group_9bf1cc8bf60107632b964bafc53a5fa1;

        var precioMinDatos = 3500;
        var precioMaxDatos = 105000;
        var m2MinDatos = 10;
        var m2MaxDatos = 400;

        // Rango actualmente seleccionado en cada filtro; ambos se van actualizando por
        // separado desde configurarRango(), y aplicarFiltro() siempre revisa los dos a
        // la vez (un inmueble solo se muestra si pasa AMBOS filtros).
        var precioActualMin = precioMinDatos, precioActualMax = precioMaxDatos;
        var m2ActualMin = m2MinDatos, m2ActualMax = m2MaxDatos;

        // Botón "Filtros": el panel empieza oculto (ver CSS, display: none) y cada
        // clic alterna entre mostrarlo/ocultarlo, cambiando también la flechita del
        // botón (▾ cerrado, ▴ abierto) para que se note el estado.
        var botonFiltros = document.getElementById('boton-filtros');
        var panelFiltros = document.getElementById('panel-filtros');
        var panelAbierto = false;
        botonFiltros.addEventListener('click', function() {
            panelAbierto = !panelAbierto;
            panelFiltros.style.display = panelAbierto ? 'block' : 'none';
            botonFiltros.innerHTML = panelAbierto ? 'Filtros &#9652;' : 'Filtros &#9662;';
        });

        function aplicarFiltro() {
            marcadoresConDatos.forEach(function(m) {
                var pasaPrecio = (
                    m.precio === null ||
                    (m.precio >= precioActualMin && m.precio <= precioActualMax)
                );
                var pasaM2 = (
                    m.m2 === null || (m.m2 >= m2ActualMin && m.m2 <= m2ActualMax)
                );
                var visible = pasaPrecio && pasaM2;
                m.capas.forEach(function(capa) {
                    if (visible) {
                        if (!grupo.hasLayer(capa)) grupo.addLayer(capa);
                    } else {
                        if (grupo.hasLayer(capa)) grupo.removeLayer(capa);
                    }
                });
            });
        }

        // Crea un slider de dos manijas 100% casero (sin <input type="range">):
        // "manijaMin"/"manijaMax" son los círculos que se arrastran con el mouse o el
        // dedo sobre "contenedor" (el <div class="rango-doble">). Se usa una vez para
        // el filtro de precio y otra para el de m², en vez de duplicar la lógica.
        function crearRangoDoble(opciones) {
            var contenedor = document.getElementById(opciones.idContenedor);
            var manijaMin = document.getElementById(opciones.idManijaMin);
            var manijaMax = document.getElementById(opciones.idManijaMax);
            var relleno = document.getElementById(opciones.idRelleno);
            var texto = document.getElementById(opciones.idTexto);
            var datosMin = opciones.datosMin;
            var datosMax = opciones.datosMax;
            var paso = opciones.paso || 1;

            var valorMin = datosMin;
            var valorMax = datosMax;

            function aPorcentaje(v) {
                var span = datosMax - datosMin;
                if (span <= 0) { return 0; }
                return ((v - datosMin) / span) * 100;
            }

            function redondear(v) {
                var pasos = Math.round((v - datosMin) / paso);
                var r = datosMin + pasos * paso;
                return Math.min(datosMax, Math.max(datosMin, r));
            }

            function pintar() {
                var pctMin = aPorcentaje(valorMin);
                var pctMax = aPorcentaje(valorMax);
                manijaMin.style.left = pctMin + "%";
                manijaMax.style.left = pctMax + "%";
                relleno.style.left = pctMin + "%";
                relleno.style.width = (pctMax - pctMin) + "%";
                texto.innerText = opciones.formatear(valorMin, valorMax);
                opciones.onCambio(valorMin, valorMax);
            }

            function mover(cual, clientX) {
                var rect = contenedor.getBoundingClientRect();
                if (rect.width <= 0) { return; }
                var pct = ((clientX - rect.left) / rect.width) * 100;
                pct = Math.min(100, Math.max(0, pct));
                var crudo = datosMin + (pct / 100) * (datosMax - datosMin);
                var valor = redondear(crudo);
                if (cual === "min") {
                    valorMin = Math.min(valor, valorMax);
                } else {
                    valorMax = Math.max(valor, valorMin);
                }
                pintar();
                aplicarFiltro();
            }

            function activarArrastre(manija, cual) {
                function alMover(e) {
                    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    mover(cual, clientX);
                }
                function alSoltar() {
                    document.removeEventListener("mousemove", alMover);
                    document.removeEventListener("mouseup", alSoltar);
                    document.removeEventListener("touchmove", alMover);
                    document.removeEventListener("touchend", alSoltar);
                }
                manija.addEventListener("mousedown", function(e) {
                    e.preventDefault();
                    document.addEventListener("mousemove", alMover);
                    document.addEventListener("mouseup", alSoltar);
                });
                manija.addEventListener("touchstart", function() {
                    document.addEventListener("touchmove", alMover);
                    document.addEventListener("touchend", alSoltar);
                });
            }

            activarArrastre(manijaMin, "min");
            activarArrastre(manijaMax, "max");

            pintar();
        }

        crearRangoDoble({
            idContenedor: "rango-precio",
            idManijaMin: "manija-precio-min", idManijaMax: "manija-precio-max",
            idRelleno: "relleno-precio", idTexto: "valor-precio-rango",

            },

        });

        crearRangoDoble({

            idManijaMin: "manija-m2-min", idManijaMax: "manija-m2-max",
            idRelleno: "relleno-m2", idTexto: "valor-m2-rango",

            },
            onCambio: function(vMin, vMax) { m2ActualMin = vMin; m2ActualMax = vMax; }
        });
    });
