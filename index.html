      .lista-checks label {

      }
      .lista-checks input { margin-right: 6px; cursor: pointer; }

      /* Quita el estilo por default del tooltip de Leaflet (fondo blanco, borde,
         sombra y la flechita triangular) para la etiqueta de precio, que ya trae su
         propio fondo/borde/color en el <div> de adentro (ver la sección 4 del
         notebook). Sin esto se verían DOS cajas encimadas: la de Leaflet y la
         nuestra. Se usan selectores de dos clases combinadas (más específicos que
         los de Leaflet) para que esto gane sin importar en qué orden se haya
         cargado cada hoja de estilos. */
      .leaflet-tooltip.etiqueta-precio-tooltip {
          background: transparent; border: none; box-shadow: none; padding: 0;
      }
      .leaflet-tooltip-top.etiqueta-precio-tooltip::before,
      .leaflet-tooltip-bottom.etiqueta-precio-tooltip::before,
      .leaflet-tooltip-left.etiqueta-precio-tooltip::before,
      .leaflet-tooltip-right.etiqueta-precio-tooltip::before {
          display: none;
      }

        var grupo = marker_cluster_d3d7a44c11435de97890e4478b9888a8;

        var precioMinDatos = 3200;
        var precioMaxDatos = 135000;
        var m2MinDatos = 8;
        var m2MaxDatos = 650;
        var alcaldiasTodas = ["ALVARO OBREGON","AZCAPOTZALCO","BENITO JUAREZ","COYOACAN","CUAUHTEMOC","GUSTAVO A. MADERO","IZTACALCO","IZTAPALAPA","LA MAGDALENA CONTRERAS","MIGUEL HIDALGO","TLAHUAC","TLALPAN","VENUSTIANO CARRANZA","XOCHIMILCO"];
        var tiposTodos = ["CASA","CASA DUPLEX","CASA EN CONDOMINIO","DEPARTAMENTO"];

        // Rango/conjunto actualmente seleccionado en cada filtro; los cuatro se
        // inicializan AQUÍ (con todo incluido) antes de configurar cualquier control,
        // para que aplicarFiltro() siempre tenga algo válido que revisar sin importar
        // en qué orden se terminen de configurar los controles más abajo. Cada uno se
        // va actualizando por separado (desde crearRangoDoble/configurarListaChecks),
        // y aplicarFiltro() siempre revisa los cuatro a la vez (un inmueble solo se
        // muestra si los cumple TODOS).
        var precioActualMin = precioMinDatos, precioActualMax = precioMaxDatos;
        var m2ActualMin = m2MinDatos, m2ActualMax = m2MaxDatos;
        var alcaldiaSeleccionada = new Set(alcaldiasTodas);
        var tipoSeleccionado = new Set(tiposTodos);

        // Botón "Filtros": el panel empieza oculto (ver CSS, display: none) y cada
        // clic alterna entre mostrarlo/ocultarlo, cambiando también la flechita del
        // botón (▾ cerrado, ▴ abierto) para que se note el estado.
        var botonFiltros = document.getElementById('boton-filtros');
        var panelFiltros = document.getElementById('panel-filtros');
        var panelAbierto = false;
        botonFiltros.addEventListener('click', function() {
            panelAbierto = !panelAbierto;
            panelFiltros.style.display = panelAbierto ? 'block' : 'none';
            botonFiltros.innerHTML = panelAbierto ? 'Filtros &#9652;' : 'Filtros &#9662;';
        });

        function aplicarFiltro() {
            marcadoresConDatos.forEach(function(m) {
                var pasaPrecio = (
                    m.precio === null ||
                    (m.precio >= precioActualMin && m.precio <= precioActualMax)
                );
                var pasaM2 = (
                    m.m2 === null || (m.m2 >= m2ActualMin && m.m2 <= m2ActualMax)
                );
                var pasaAlcaldia = (
                    m.alcaldia === null || alcaldiaSeleccionada.has(m.alcaldia)
                );
                var pasaTipo = (
                    m.tipo === null || tipoSeleccionado.has(m.tipo)
                );
                var visible = pasaPrecio && pasaM2 && pasaAlcaldia && pasaTipo;
                m.capas.forEach(function(capa) {
                    if (visible) {
                        if (!grupo.hasLayer(capa)) grupo.addLayer(capa);
                    } else {
                        if (grupo.hasLayer(capa)) grupo.removeLayer(capa);
                    }
                });
            });
        }

        // Conecta una lista de casillas (checkboxes, todas marcadas por default) con
        // aplicarFiltro(): "valores" es el arreglo de textos reales en el mismo orden
        // en que se generaron las casillas ("{prefijoId}0", "{prefijoId}1", ...), así
        // que no hace falta sanitizar el texto para usarlo como id de HTML.
        function configurarListaChecks(opciones) {
            function leerSeleccionados() {
                var seleccionados = new Set();
                opciones.valores.forEach(function(valor, i) {
                    var chk = document.getElementById(opciones.prefijoId + i);
                    if (chk && chk.checked) { seleccionados.add(valor); }
                });
                return seleccionados;
            }

            opciones.valores.forEach(function(valor, i) {
                var chk = document.getElementById(opciones.prefijoId + i);
                if (!chk) { return; }
                chk.addEventListener('change', function() {
                    opciones.onCambio(leerSeleccionados());
                    aplicarFiltro();
                });
            });
        }

        // Crea un slider de dos manijas 100% casero (sin <input type="range">):
        // "manijaMin"/"manijaMax" son los círculos que se arrastran con el mouse o el
        // dedo sobre "contenedor" (el <div class="rango-doble">). Se usa una vez para
        // el filtro de precio y otra para el de m², en vez de duplicar la lógica.
        function crearRangoDoble(opciones) {
            var contenedor = document.getElementById(opciones.idContenedor);
            var manijaMin = document.getElementById(opciones.idManijaMin);
            var manijaMax = document.getElementById(opciones.idManijaMax);
            var relleno = document.getElementById(opciones.idRelleno);
            var texto = document.getElementById(opciones.idTexto);
            var datosMin = opciones.datosMin;
            var datosMax = opciones.datosMax;
            var paso = opciones.paso || 1;

            var valorMin = datosMin;
            var valorMax = datosMax;

            function aPorcentaje(v) {
                var span = datosMax - datosMin;
                if (span <= 0) { return 0; }
                return ((v - datosMin) / span) * 100;
            }

            function redondear(v) {
                var pasos = Math.round((v - datosMin) / paso);
                var r = datosMin + pasos * paso;
                return Math.min(datosMax, Math.max(datosMin, r));
            }

            function pintar() {
                var pctMin = aPorcentaje(valorMin);
                var pctMax = aPorcentaje(valorMax);
                manijaMin.style.left = pctMin + "%";
                manijaMax.style.left = pctMax + "%";
                relleno.style.left = pctMin + "%";
                relleno.style.width = (pctMax - pctMin) + "%";
                texto.innerText = opciones.formatear(valorMin, valorMax);
                opciones.onCambio(valorMin, valorMax);
            }

            function mover(cual, clientX) {
                var rect = contenedor.getBoundingClientRect();
                if (rect.width <= 0) { return; }
                var pct = ((clientX - rect.left) / rect.width) * 100;
                pct = Math.min(100, Math.max(0, pct));
                var crudo = datosMin + (pct / 100) * (datosMax - datosMin);
                var valor = redondear(crudo);
                if (cual === "min") {
                    valorMin = Math.min(valor, valorMax);
                } else {
                    valorMax = Math.max(valor, valorMin);
                }
                pintar();
                aplicarFiltro();
            }

            function activarArrastre(manija, cual) {
                function alMover(e) {
                    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    mover(cual, clientX);
                }
                function alSoltar() {
                    document.removeEventListener("mousemove", alMover);
                    document.removeEventListener("mouseup", alSoltar);
                    document.removeEventListener("touchmove", alMover);
                    document.removeEventListener("touchend", alSoltar);
                }
                manija.addEventListener("mousedown", function(e) {
                    e.preventDefault();
                    document.addEventListener("mousemove", alMover);
                    document.addEventListener("mouseup", alSoltar);
                });
                manija.addEventListener("touchstart", function() {
                    document.addEventListener("touchmove", alMover);
                    document.addEventListener("touchend", alSoltar);
                });
            }

            activarArrastre(manijaMin, "min");
            activarArrastre(manijaMax, "max");

            pintar();
        }

        crearRangoDoble({
            idContenedor: "rango-precio",
            idManijaMin: "manija-precio-min", idManijaMax: "manija-precio-max",
            idRelleno: "relleno-precio", idTexto: "valor-precio-rango",
            datosMin: precioMinDatos, datosMax: precioMaxDatos, paso: 500,
            formatear: function(vMin, vMax) {
                return "$" + vMin.toLocaleString() + " \u2013 $" + vMax.toLocaleString();
            },
            onCambio: function(vMin, vMax) { precioActualMin = vMin; precioActualMax = vMax; }
        });

        crearRangoDoble({
            idContenedor: "rango-m2",
            idManijaMin: "manija-m2-min", idManijaMax: "manija-m2-max",
            idRelleno: "relleno-m2", idTexto: "valor-m2-rango",
            datosMin: m2MinDatos, datosMax: m2MaxDatos, paso: 1,
            formatear: function(vMin, vMax) {
                return vMin.toLocaleString() + " \u2013 " + vMax.toLocaleString() + " m\u00b2";
            },
            onCambio: function(vMin, vMax) { m2ActualMin = vMin; m2ActualMax = vMax; }
        });

        configurarListaChecks({
            valores: alcaldiasTodas, prefijoId: "chk-alcaldia-",
            onCambio: function(seleccionados) { alcaldiaSeleccionada = seleccionados; }
        });

        configurarListaChecks({
            valores: tiposTodos, prefijoId: "chk-tipo-",
