        var precioMinDatos = 3500;
        var precioMaxDatos = 105000;
        var m2MinDatos = 10;
        var m2MaxDatos = 400;

        // Rango actualmente seleccionado en cada filtro; ambos se van actualizando por
        // separado desde configurarRango(), y aplicarFiltro() siempre revisa los dos a
        // la vez (un inmueble solo se muestra si pasa AMBOS filtros).
        var precioActualMin = precioMinDatos, precioActualMax = precioMaxDatos;
        var m2ActualMin = m2MinDatos, m2ActualMax = m2MaxDatos;

        // Botón "Filtros": el panel empieza oculto (ver CSS, display: none) y cada
        // clic alterna entre mostrarlo/ocultarlo, cambiando también la flechita del
        // botón (▾ cerrado, ▴ abierto) para que se note el estado.
        var botonFiltros = document.getElementById('boton-filtros');
        var panelFiltros = document.getElementById('panel-filtros');
        var panelAbierto = false;
        botonFiltros.addEventListener('click', function() {
            panelAbierto = !panelAbierto;
            panelFiltros.style.display = panelAbierto ? 'block' : 'none';
            botonFiltros.innerHTML = panelAbierto ? 'Filtros &#9652;' : 'Filtros &#9662;';
        });

        function aplicarFiltro() {
            marcadoresConDatos.forEach(function(m) {
                var pasaPrecio = (
                    m.precio === null ||
                    (m.precio >= precioActualMin && m.precio <= precioActualMax)
                );
                var pasaM2 = (
                    m.m2 === null || (m.m2 >= m2ActualMin && m.m2 <= m2ActualMax)
                );
                var visible = pasaPrecio && pasaM2;
                m.capas.forEach(function(capa) {
                    if (visible) {
                        if (!grupo.hasLayer(capa)) grupo.addLayer(capa);
                    } else {
                        if (grupo.hasLayer(capa)) grupo.removeLayer(capa);
                    }
                });
            });
        }

        // Conecta un par de sliders (mínimo/máximo) con su texto y su barra de relleno.
        // Se usa una sola vez para el filtro de precio y otra para el de m², en vez de
        // duplicar toda esta lógica dos veces.
        function configurarRango(opciones) {
            var sliderMin = document.getElementById(opciones.idMin);
            var sliderMax = document.getElementById(opciones.idMax);
            var texto = document.getElementById(opciones.idTexto);
            var relleno = document.getElementById(opciones.idRelleno);

            function actualizarRelleno(vMin, vMax) {
                var span = opciones.datosMax - opciones.datosMin;
                if (span <= 0) { return; }
                var pctIzq = ((vMin - opciones.datosMin) / span) * 100;
                var pctDer = ((vMax - opciones.datosMin) / span) * 100;
                relleno.style.left = pctIzq + "%";
                relleno.style.width = (pctDer - pctIzq) + "%";
            }

            function actualizar() {
                var vMin = parseInt(sliderMin.value, 10);
                var vMax = parseInt(sliderMax.value, 10);
                texto.innerText = opciones.formatear(vMin, vMax);
                actualizarRelleno(vMin, vMax);
                opciones.onCambio(vMin, vMax);
                aplicarFiltro();
            }

            sliderMin.addEventListener('input', function() {
                if (parseInt(sliderMin.value, 10) > parseInt(sliderMax.value, 10)) {
                    sliderMin.value = sliderMax.value;
                }
                actualizar();
            });
            sliderMax.addEventListener('input', function() {
                if (parseInt(sliderMax.value, 10) < parseInt(sliderMin.value, 10)) {
                    sliderMax.value = sliderMin.value;
                }
                actualizar();
            });

            actualizar();
        }

            onCambio: function(vMin, vMax) { m2ActualMin = vMin; m2ActualMax = vMax; }
