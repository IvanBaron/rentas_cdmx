        function aplicarFiltroPrecio(minPrecio, maxPrecio) {
            marcadoresConPrecio.forEach(function(m) {
                var visible = (
                    m.precio === null || (m.precio >= minPrecio && m.precio <= maxPrecio)
                );
                m.capas.forEach(function(capa) {
                    if (visible) {
                        if (!grupo.hasLayer(capa)) grupo.addLayer(capa);
                    } else {
                        if (grupo.hasLayer(capa)) grupo.removeLayer(capa);
                    }
                });
            });

        var sliderMin = document.getElementById('slider-precio-min');

        function actualizarRelleno(vMin, vMax) {
            var span = precioMaxDatos - precioMinDatos;
            if (span <= 0) { return; }
            var pctIzq = ((vMin - precioMinDatos) / span) * 100;
            var pctDer = ((vMax - precioMinDatos) / span) * 100;
            relleno.style.left = pctIzq + "%";
            relleno.style.width = (pctDer - pctIzq) + "%";
        }

        function actualizarFiltro() {
            var vMin = parseInt(sliderMin.value);
            var vMax = parseInt(sliderMax.value);
            texto.innerText = "$" + vMin.toLocaleString() + " \u2013 $" + vMax.toLocaleString();
            actualizarRelleno(vMin, vMax);
            aplicarFiltroPrecio(vMin, vMax);
        }

        sliderMin.addEventListener('input', function() {
            if (parseInt(sliderMin.value) > parseInt(sliderMax.value)) {
                sliderMin.value = sliderMax.value;
            }
            actualizarFiltro();
        });
        sliderMax.addEventListener('input', function() {
            if (parseInt(sliderMax.value) < parseInt(sliderMin.value)) {
                sliderMax.value = sliderMin.value;
            }
            actualizarFiltro();
        });

        actualizarFiltro();
